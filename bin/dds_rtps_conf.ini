# This "common" section configures Service_Participant defaults.
[common]

# Debug Level
DCPSDebugLevel=0

# Use RTPS discovery instead of InfoRepo.
DCPSDefaultDiscovery=DEFAULT_RTPS

# Sets the global transport configuration (used by default in the
# process) to config1, defined below.
DCPSGlobalTransportConfig=config1


# RTPS discovery configuration.
[rtps_discovery/DEFAULT_RTPS]
ResendPeriod=5
SedpMulticast=1


# Transport configuration named config1, contains a single transport
# instance named rtps1 (defined below).
[config/config1]
transports=rtps1


# Transport instance named rtps1, of type "rtps_udp".
[transport/rtps1]
transport_type=rtps_udp
local_address=0.0.0.0:0
use_multicast=1
